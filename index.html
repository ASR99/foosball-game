<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Foosball</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;font-family:Arial,sans-serif}
  canvas{display:block;touch-action:none}
  #rotate{display:none;position:fixed;inset:0;background:#0a0a1a;z-index:999;
    flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:18px}
  #rotate .ico{font-size:64px;animation:rota 1.5s ease-in-out infinite alternate}
  #rotate p{font-size:17px;color:rgba(255,255,255,.55);text-align:center;padding:0 30px}
  @keyframes rota{from{transform:rotate(-15deg)}to{transform:rotate(75deg)}}
  @media(orientation:portrait){#rotate{display:flex}}
</style>
</head>
<body>
<div id="rotate"><div class="ico">📱</div><p>Rotate your device to landscape to play</p></div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script>
const SERVER_URL="https://foosball-server.onrender.com";
const C=document.getElementById('c'),ctx=C.getContext('2d');
const LW=900,LH=540;
let cW,cH,sc,ox,oy;
function resize(){cW=C.width=window.innerWidth;cH=C.height=window.innerHeight;sc=Math.min(cW/LW,cH/LH);ox=(cW-LW*sc)/2;oy=(cH-LH*sc)/2;}
resize();window.addEventListener('resize',resize);
function s2l(sx,sy){return[(sx-ox)/sc,(sy-oy)/sc];}

/* ══════════════════════════════════
   PLATFORM  (desktop | mobile)
══════════════════════════════════ */
let platform = null; // 'desktop' | 'mobile'

const KEYS = {
  desktop:{
    p1up:'KeyW', p1dn:'KeyS', p1kk:'Space',
    p2up:'ArrowUp', p2dn:'ArrowDown', p2kk:'Enter',
    pause:'Escape'
  },
  mobile:{
    p1up:null, p1dn:null, p1kk:null,
    p2up:null, p2dn:null, p2kk:null,
    pause:null
  }
};

// Platform-select card definitions
const PLAT_CARDS = [
  {
    x:LW/2-310, y:165, w:260, h:240,
    id:'desktop',
    icon:'🖥️',
    label:'Desktop',
    sub:'Keyboard & Mouse',
    desc:['P1:  W / S  +  Space','P2:  ↑ / ↓  +  Enter','Esc  →  Pause'],
    c0:'#1e3a8a', c1:'#0f1e4a', bdr:'#3b82f6', glow:'#3b82f6'
  },
  {
    x:LW/2+50,  y:165, w:260, h:240,
    id:'mobile',
    icon:'📱',
    label:'Mobile / Tablet',
    sub:'On-Screen Touch Controls',
    desc:['Left strip  →  P1 controls','Right strip →  P2 controls','Big ⚡ button  →  Kick'],
    c0:'#064e3b', c1:'#022c22', bdr:'#10b981', glow:'#10b981'
  }
];

/* ══════════════════════════════════
   PARTICLES
══════════════════════════════════ */
const parts=[];
function burst(x,y,cols,n=28){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*8;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,dec:.018+Math.random()*.018,sz:3+Math.random()*5,col:cols[i%cols.length]});}
}
function tickParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.96;p.vy*=.96;p.life-=p.dec;if(p.life<=0)parts.splice(i,1);}}
function drawParts(){parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

/* ══════════════════════════════════
   FADE
══════════════════════════════════ */
let fadeAlpha=0,fadeDir=0,fadeNext=null;
function fadeTo(st){fadeNext=st;fadeDir=1;}
function tickFade(){
  if(!fadeDir)return;
  fadeAlpha+=fadeDir*.07;
  if(fadeAlpha>=1&&fadeNext){gst=fadeNext;fadeNext=null;fadeDir=-1;}
  if(fadeAlpha<=0){fadeDir=0;fadeAlpha=0;}
  ctx.fillStyle=`rgba(0,0,0,${Math.min(1,fadeAlpha)})`;ctx.fillRect(0,0,LW,LH);
}
const vib=p=>navigator.vibrate&&navigator.vibrate(p);

/* ══════════════════════════════════
   TABLE / GAME CONSTANTS
══════════════════════════════════ */
const T={x:85,y:72,w:730,h:396};
const GH=128,GY=T.y+(T.h-GH)/2;
const BR=10,FR=11;
const COL=['#ff3333','#3399ff'],LGT=['#ff7777','#66bbff'],DRK=['#990000','#004488'];
const RC=[[52,0,1],[167,1,3],[287,0,2],[443,1,2],[563,0,3],[678,1,1]];

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let mode=null,gst='platform',score=[0,0],winner=-1;
let ball={x:LW/2,y:LH/2,vx:0,vy:0,spin:0},rods=[];
let goalAnim=0,goalTeam=-1,releaseTeam=0,aiTimer=0;
const kCool=[0,0];
const ts={p1up:false,p1dn:false,p1kk:false,p2up:false,p2dn:false,p2kk:false};
const tMap={};const kd=new Set();
const btnPress={};
let scoreAnim=[0,0];
let bgStars=[];
for(let i=0;i<90;i++)bgStars.push({x:Math.random()*LW,y:Math.random()*LH,r:.6+Math.random()*1.2,a:.05+Math.random()*.2});
let platHover=null; // hovered platform card id

/* ══════════════════════════════════
   ONLINE
══════════════════════════════════ */
let socket=null,myPid=null,roomCode='------',syncTick=0;
function connectOnline(){
  gst='waiting';socket=io(SERVER_URL);
  socket.on('connect',()=>{roomCode=socket.id.slice(0,6).toUpperCase();});
  socket.on('start',d=>{myPid=d.player;mode='online';buildRods();ball={x:LW/2,y:LH/2,vx:0,vy:0,spin:0};score=[0,0];winner=-1;releaseTeam=0;fadeTo('release');});
  socket.on('rod_sync',d=>{d.rods.forEach((yo,i)=>{if(rods[i])rods[i].yOff=yo;});});
  socket.on('ball_sync',d=>{if(myPid===2){ball.x=d.x;ball.y=d.y;ball.vx=d.vx;ball.vy=d.vy;ball.spin=d.spin;}});
  socket.on('release_pick',d=>releaseBall(d.type,true));
  socket.on('goal_sync',d=>{score=d.score;goalTeam=d.goalTeam;releaseTeam=d.releaseTeam;triggerGoal();});
  socket.on('opponent_left',()=>{alert('Opponent disconnected!');exitToMenu();});
}

/* ══════════════════════════════════
   GAME HELPERS
══════════════════════════════════ */
function buildRods(){rods=RC.map(([xr,tm,cnt])=>{const x=T.x+xr,sp=T.h/(cnt+1);return{x,team:tm,count:cnt,sp,yOff:0,min:-(sp-2),max:sp-2};});}
function getFigs(r){return Array.from({length:r.count},(_,i)=>({x:r.x,y:T.y+r.sp*(i+1)+r.yOff}));}
function getBallCol(){
  if(score[0]>score[1])return{c:COL[0],g1:LGT[0],g2:DRK[0],cols:[COL[0],'#ff8888','#ffcccc','#ff4444']};
  if(score[1]>score[0])return{c:COL[1],g1:LGT[1],g2:DRK[1],cols:[COL[1],'#66aaff','#bbddff','#2277ff']};
  return{c:'#fff',g1:'#fff',g2:'#bbb',cols:['#fff','#ddd','#aaa']};
}
function startGame(m){
  if(m==='online'){connectOnline();return;}
  mode=m;score=[0,0];scoreAnim=[0,0];winner=-1;buildRods();
  ball={x:LW/2,y:LH/2,vx:0,vy:0,spin:0};releaseTeam=0;aiTimer=150;fadeTo('release');
}
function exitToMenu(){socket&&socket.disconnect();socket=null;myPid=null;mode=null;parts.splice(0);fadeTo('menu');vib(30);}
function triggerGoal(){
  const gc=getBallCol();
  burst(goalTeam===0?T.x+20:T.x+T.w-20,GY+GH/2,gc.cols,36);
  burst(LW/2,LH/2,['#ffe040','#ffaa00','#fff'],20);
  vib([80,30,80]);goalAnim=130;fadeTo('goal');
}

/* ══════════════════════════════════
   PHYSICS
══════════════════════════════════ */
function moveTeam(tm,dir){rods.forEach(r=>{if(r.team!==tm)return;r.yOff=Math.max(r.min,Math.min(r.max,r.yOff+dir*4));});}
function capSpd(){const s=Math.hypot(ball.vx,ball.vy),M=17;if(s>M){ball.vx*=M/s;ball.vy*=M/s;}}
function tryKick(tm){
  if(kCool[tm]>0)return;
  let bd=Infinity;
  rods.forEach(r=>{if(r.team!==tm)return;getFigs(r).forEach(f=>{const d=Math.hypot(ball.x-f.x,ball.y-f.y);if(d<bd)bd=d;});});
  if(bd<72){ball.vx=(tm===0?1:-1)*(9+Math.random()*3);ball.vy+=(Math.random()-.5)*6;capSpd();kCool[tm]=22;vib(15);}
}
function releaseBall(type,fromNet=false){
  if(!fromNet&&mode==='online')socket.emit('release_pick',{type});
  const dir=releaseTeam===0?1:-1;
  ball.x=LW/2;ball.y=LH/2;ball.spin=0;
  if(type==='fast'){ball.vx=dir*12;ball.vy=(Math.random()-.5)*2;}
  else if(type==='slow'){ball.vx=dir*3;ball.vy=(Math.random()-.5)*2;}
  else{ball.vx=dir*6;ball.vy=(Math.random()<.5?1:-1)*3.5;ball.spin=(Math.random()<.5?1:-1)*.14;}
  fadeTo('playing');vib(20);
}
function aiUpdate(){
  if(mode!=='1p')return;
  rods.forEach(r=>{if(r.team!==1)return;
    const cf=getFigs(r).reduce((b,f)=>Math.abs(f.y-ball.y)<Math.abs(b.y-ball.y)?f:b);
    if(cf.y<ball.y-4)r.yOff=Math.max(r.min,Math.min(r.max,r.yOff+3.2));
    else if(cf.y>ball.y+4)r.yOff=Math.max(r.min,Math.min(r.max,r.yOff-3.2));
  });
  if(kCool[1]<=0)rods.forEach(r=>{if(r.team!==1)return;getFigs(r).forEach(f=>{if(Math.abs(ball.x-f.x)<28&&Math.abs(ball.y-f.y)<FR+BR+8)tryKick(1);});});
}
function handleInput(){
  const K=KEYS[platform]||KEYS.desktop;
  const myT=mode==='online'?(myPid===1?0:1):-1;
  const cp1=mode!=='online'||myT===0;
  const cp2=mode==='2p'||(mode==='online'&&myT===1);
  if(platform==='desktop'){
    if(cp1){if(kd.has(K.p1up))moveTeam(0,-1);if(kd.has(K.p1dn))moveTeam(0,1);if(kd.has(K.p1kk))tryKick(0);}
    if(cp2){if(kd.has(K.p2up))moveTeam(1,-1);if(kd.has(K.p2dn))moveTeam(1,1);if(kd.has(K.p2kk))tryKick(1);}
  } else {
    if(cp1){if(ts.p1up)moveTeam(0,-1);if(ts.p1dn)moveTeam(0,1);if(ts.p1kk)tryKick(0);}
    if(cp2){if(ts.p2up)moveTeam(1,-1);if(ts.p2dn)moveTeam(1,1);if(ts.p2kk)tryKick(1);}
  }
  if(mode==='online'&&syncTick%3===0)socket.emit('rod_sync',{rods:rods.map(r=>r.yOff)});
  syncTick++;
}
function updateBall(){
  ball.vy+=ball.spin;ball.spin*=.97;ball.vx*=.997;ball.vy*=.997;
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-BR<T.y){ball.y=T.y+BR;ball.vy=Math.abs(ball.vy);vib(8);}
  if(ball.y+BR>T.y+T.h){ball.y=T.y+T.h-BR;ball.vy=-Math.abs(ball.vy);vib(8);}
  if(ball.x-BR<T.x){
    if(ball.y>GY&&ball.y<GY+GH){score[1]++;goalTeam=1;releaseTeam=1;if(mode==='online'&&myPid===1)socket.emit('goal_sync',{score,goalTeam:1,releaseTeam:1});triggerGoal();return;}
    else{ball.x=T.x+BR;ball.vx=Math.abs(ball.vx);vib(10);}
  }
  if(ball.x+BR>T.x+T.w){
    if(ball.y>GY&&ball.y<GY+GH){score[0]++;goalTeam=0;releaseTeam=0;if(mode==='online'&&myPid===1)socket.emit('goal_sync',{score,goalTeam:0,releaseTeam:0});triggerGoal();return;}
    else{ball.x=T.x+T.w-BR;ball.vx=-Math.abs(ball.vx);vib(10);}
  }
  rods.forEach(r=>{getFigs(r).forEach(f=>{
    const dx=ball.x-f.x,dy=ball.y-f.y,dist=Math.hypot(dx,dy),minD=BR+FR;
    if(dist<minD&&dist>0){
      const nx=dx/dist,ny=dy/dist,dot=ball.vx*nx+ball.vy*ny;
      if(dot<0){ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;}
      ball.x+=nx*(minD-dist);ball.y+=ny*(minD-dist);
      const sp=Math.hypot(ball.vx,ball.vy);if(sp<3){ball.vx*=3/sp;ball.vy*=3/sp;}capSpd();
    }
  });});
  if(mode==='online'&&myPid===1&&syncTick%2===0)socket.emit('ball_sync',{x:ball.x,y:ball.y,vx:ball.vx,vy:ball.vy,spin:ball.spin});
}

/* ══════════════════════════════════
   TOUCH
══════════════════════════════════ */
function getZone(lx,ly){
  const h3=LH/3;
  if(lx<85)return ly<h3?'p1up':ly<h3*2?'p1kk':'p1dn';
  if(lx>815)return ly<h3?'p2up':ly<h3*2?'p2kk':'p2dn';
  return null;
}
function mapZone(z){
  if(mode!=='online')return z;
  if(myPid===2){const m={p1up:'p2up',p1dn:'p2dn',p1kk:'p2kk',p2up:'p1up',p2dn:'p1dn',p2kk:'p1kk'};return m[z]||z;}
  return z;
}
function hit(lx,ly,b){return lx>=b.x&&lx<=b.x+b.w&&ly>=b.y&&ly<=b.y+b.h;}

/* ══════════════════════════════════
   BUTTON LAYOUTS
══════════════════════════════════ */
const PB={x:851,y:10,w:40,h:30};
const MB=[
  {x:LW/2-285,y:270,w:165,h:68,label:'👤  1 Player',a:'1p',c0:'#1e3a8a',c1:'#0f1e4a',bdr:'#3b82f6'},
  {x:LW/2-75, y:270,w:165,h:68,label:'👥  2 Players',a:'2p',c0:'#1e3a8a',c1:'#0f1e4a',bdr:'#3b82f6'},
  {x:LW/2+135,y:270,w:165,h:68,label:'🌐  Online',a:'online',c0:'#064e3b',c1:'#022c22',bdr:'#10b981'},
];
// Change platform button in menu
const CHGBTN={x:LW/2-68,y:370,w:136,h:34,label:'🔄 Change Platform',c0:'#1a1a3a',c1:'#0f0f22',bdr:'rgba(255,255,255,.2)'};
const RB=[
  {x:165,y:260,w:168,h:88,type:'fast',icon:'⚡',label:'FAST',sub:'Blazing speed',c0:'#92400e',c1:'#451a03',bdr:'#f59e0b'},
  {x:366,y:260,w:168,h:88,type:'slow',icon:'🐢',label:'SLOW',sub:'Controlled entry',c0:'#065f46',c1:'#022c22',bdr:'#10b981'},
  {x:567,y:260,w:168,h:88,type:'spin',icon:'🌀',label:'SPIN',sub:'Curved & tricky',c0:'#4c1d95',c1:'#1e0a3c',bdr:'#8b5cf6'},
];
const PM=[
  {x:LW/2-130,y:205,w:260,h:56,label:'▶  RESUME',a:'resume',c0:'#064e3b',c1:'#022c22',bdr:'#10b981'},
  {x:LW/2-130,y:273,w:260,h:56,label:'🔄  RESTART',a:'restart',c0:'#1e3a8a',c1:'#0f1e4a',bdr:'#3b82f6'},
  {x:LW/2-130,y:341,w:260,h:56,label:'🔄 Change Platform',a:'platform',c0:'#2d1b69',c1:'#150d35',bdr:'#8b5cf6'},
  {x:LW/2-130,y:409,w:260,h:56,label:'🏠  EXIT TO MENU',a:'exit',c0:'#7f1d1d',c1:'#3b0f0f',bdr:'#ef4444'},
];
const GOB=[
  {x:LW/2-150,y:LH/2+55,w:135,h:52,label:'🔄 Again',a:'again',c0:'#1e3a8a',c1:'#0f1e4a',bdr:'#3b82f6'},
  {x:LW/2+15, y:LH/2+55,w:135,h:52,label:'🏠 Menu',a:'menu',c0:'#7f1d1d',c1:'#3b0f0f',bdr:'#ef4444'},
];

/* ══════════════════════════════════
   TAP HANDLER
══════════════════════════════════ */
function onTap(lx,ly){
  if(gst==='platform'){
    PLAT_CARDS.forEach(c=>{
      if(lx>=c.x&&lx<=c.x+c.w&&ly>=c.y&&ly<=c.y+c.h){
        platform=c.id;vib(25);
        burst(c.x+c.w/2,c.y+c.h/2,
          c.id==='desktop'?['#3b82f6','#93c5fd','#fff']:['#10b981','#6ee7b7','#fff'],22);
        fadeTo('menu');
      }
    });
  } else if(gst==='menu'){
    MB.forEach(b=>{if(hit(lx,ly,b)){btnPress[b.a]=1;startGame(b.a);}});
    if(hit(lx,ly,CHGBTN)){fadeTo('platform');vib(20);}
  } else if(gst==='release'){
    const myTurn=mode!=='online'||(myPid===1&&releaseTeam===0)||(myPid===2&&releaseTeam===1);
    if(myTurn)RB.forEach(b=>{if(hit(lx,ly,b)){btnPress[b.type]=1;releaseBall(b.type);}});
  } else if(gst==='playing'){
    if(hit(lx,ly,PB)){gst='paused';vib(25);}
  } else if(gst==='paused'){
    PM.forEach(b=>{
      if(hit(lx,ly,b)){
        btnPress[b.a]=1;vib(20);
        if(b.a==='resume')gst='playing';
        else if(b.a==='restart'){score=[0,0];scoreAnim=[0,0];buildRods();ball={x:LW/2,y:LH/2,vx:0,vy:0,spin:0};releaseTeam=0;aiTimer=150;fadeTo('release');}
        else if(b.a==='platform'){fadeTo('platform');}
        else if(b.a==='exit')exitToMenu();
      }
    });
  } else if(gst==='gameover'){
    GOB.forEach(b=>{
      if(hit(lx,ly,b)){
        btnPress[b.a]=1;vib(20);
        if(b.a==='again'){score=[0,0];scoreAnim=[0,0];buildRods();ball={x:LW/2,y:LH/2,vx:0,vy:0,spin:0};releaseTeam=0;aiTimer=150;fadeTo('release');}
        else exitToMenu();
      }
    });
  } else if(gst==='waiting'){
    if(lx>=LW/2-90&&lx<=LW/2+90&&ly>=LH/2+80&&ly<=LH/2+130){socket&&socket.disconnect();socket=null;fadeTo('menu');vib(30);}
  }
}

C.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    const[lx,ly]=s2l(t.clientX,t.clientY);
    onTap(lx,ly);
    if(platform==='mobile'&&(gst==='playing'||gst==='goal')&&!hit(lx,ly,PB)){
      const z=mapZone(getZone(lx,ly));if(z){ts[z]=true;tMap[t.identifier]=z;}
    }
  }e.preventDefault();},{passive:false});
C.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    const[lx,ly]=s2l(t.clientX,t.clientY);
    const oz=tMap[t.identifier],nz=mapZone(getZone(lx,ly));
    if(oz&&oz!==nz){ts[oz]=false;if(nz){ts[nz]=true;tMap[t.identifier]=nz;}else delete tMap[t.identifier];}
  }e.preventDefault();},{passive:false});
C.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){const z=tMap[t.identifier];if(z){ts[z]=false;delete tMap[t.identifier];}}
  e.preventDefault();},{passive:false});
C.addEventListener('mousemove',e=>{
  if(gst==='platform'){const[lx,ly]=s2l(e.clientX,e.clientY);platHover=null;PLAT_CARDS.forEach(c=>{if(lx>=c.x&&lx<=c.x+c.w&&ly>=c.y&&ly<=c.y+c.h)platHover=c.id;});}
});
C.addEventListener('click',e=>{const[lx,ly]=s2l(e.clientX,e.clientY);onTap(lx,ly);});

document.addEventListener('keydown',e=>{
  kd.add(e.code);
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  const K=KEYS[platform]||KEYS.desktop;
  if(e.code===K.pause){if(gst==='playing')gst='paused';else if(gst==='paused')gst='playing';}
  if(gst==='release'){
    const myTurn=mode!=='online'||(myPid===1&&releaseTeam===0)||(myPid===2&&releaseTeam===1);
    if(myTurn){if(e.code==='Digit1')releaseBall('fast');if(e.code==='Digit2')releaseBall('slow');if(e.code==='Digit3')releaseBall('spin');}
  }
});
document.addEventListener('keyup',e=>kd.delete(e.code));

/* ══════════════════════════════════
   DRAW HELPERS
══════════════════════════════════ */
function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function gBtn(b,pressed){

  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(T.x+T.w/2,T.y+T.h/2,58,0,Math.PI*2);ctx.stroke();
  [true,false].forEach(left=>{
    const gw=42,x0=left?T.x-gw:T.x+T.w;

    for(let y=GY+18;y<GY+GH;y+=18){ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x0+gw,y);ctx.stroke();}
    for(let x=x0+13;x<x0+gw;x+=13){ctx.beginPath();ctx.moveTo(x,GY);ctx.lineTo(x,GY+GH);ctx.stroke();}

function drawBall(){
  const bc=getBallCol();
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(ball.x+3,ball.y+5,BR,BR*.4,0,0,Math.PI*2);ctx.fill();

  const t=Date.now()/1000;
  ctx.save();ctx.translate(LW/2,LH/2-45);
  for(let i=0;i<10;i++){const a=i*Math.PI/5+t*2,r=28;ctx.globalAlpha=.1+((i/10+t*.3)%1)*.9;ctx.fillStyle='#10b981';ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,5,0,Math.PI*2);ctx.fill();}
  ctx.restore();ctx.globalAlpha=1;
  ctx.font='bold 26px Arial';ctx.fillStyle='#10b981';ctx.textAlign='center';
  ctx.fillText('Waiting for opponent…',LW/2,LH/2+8);
  ctx.font='14px Arial';ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText('Share your game link with a friend',LW/2,LH/2+38);
  rrect(LW/2-72,LH/2+55,144,30,8);ctx.fillStyle='rgba(255,255,255,.06)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
  ctx.font='bold 13px Arial';ctx.fillStyle='rgba(255,255,255,.4)';ctx.textAlign='center';ctx.fillText('Room: '+roomCode,LW/2,LH/2+75);
  rrect(LW/2-90,LH/2+98,180,44,10);ctx.fillStyle='rgba(100,15,15,.8)';ctx.fill();ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;ctx.stroke();
  ctx.font='bold 16px Arial';ctx.fillStyle='#ff8888';ctx.fillText('✕  Cancel',LW/2,LH/2+125);
}
function drawGameover(){
  drawBg(false);drawTable();drawRods();drawParts();
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,LW,LH);
  ctx.save();ctx.shadowColor=COL[winner];ctx.shadowBlur=30;
  ctx.font='bold 64px Arial';ctx.textAlign='center';ctx.fillStyle='#fff';
  ctx.fillText(winner===0?'P1 Wins! 🏆':(mode==='1p'?'AI Wins! 🤖':'P2 Wins! 🏆'),LW/2,LH/2-18);
  ctx.restore();
  ctx.font='26px Arial';ctx.fillStyle='rgba(255,255,255,.55)';ctx.textAlign='center';
  ctx.fillText(`${score[0]}  —  ${score[1]}`,LW/2,LH/2+28);
  GOB.forEach(b=>{
    const pr=!!btnPress[b.a];gBtn(b,pr);if(pr)btnPress[b.a]=0;
    ctx.font='bold 17px Arial';ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.fillText(b.label,b.x+b.w/2,b.y+b.h/2+7);
  });
}

/* ══════════════════════════════════
   MAIN LOOP
══════════════════════════════════ */
function loop(){
  ctx.setTransform(1,0,0,1,0,0);ctx.fillStyle='#000';ctx.fillRect(0,0,cW,cH);
  ctx.setTransform(sc,0,0,sc,ox,oy);

  if(gst==='platform') drawPlatformSelect();
  else if(gst==='menu') drawMenu();
  else if(gst==='waiting') drawWaiting();
  else if(gst==='playing'){
    kCool[0]=Math.max(0,kCool[0]-1);kCool[1]=Math.max(0,kCool[1]-1);
    handleInput();
    if(mode!=='online'||myPid===1){aiUpdate();updateBall();}
    tickParts();
    drawBg(false);drawTable();drawRods();drawBall();drawParts();drawHUD();drawCtrl();
    if(platform==='desktop')drawDesktopLegend();
    if(score[0]>=7||score[1]>=7){winner=score[0]>=7?0:1;burst(LW/2,LH/2,[COL[winner],'#ffe040','#fff'],40);fadeTo('gameover');}
  }
  else if(gst==='goal'){
    tickParts();drawBg(false);drawTable();drawRods();drawBall();drawHUD();drawCtrl();drawGoal();
    goalAnim--;if(goalAnim<=0)fadeTo('release');
  }
  else if(gst==='release'){
    drawBg(false);drawTable();drawRods();drawHUD();drawCtrl();drawRelease();
    if(mode==='1p'&&releaseTeam===1){aiTimer--;if(aiTimer<=0){const types=['fast','slow','spin'];releaseBall(types[Math.floor(Math.random()*3)]);aiTimer=150;}}
  }
  else if(gst==='paused'){drawBg(false);drawTable();drawRods();drawBall();drawPause();}
  else if(gst==='gameover') drawGameover();

  tickFade();
  requestAnimationFrame(loop);
}
loop();
</script>
